<!DOCTYPE html>
<html>
<head>
  <title>Islamic Super App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #e8f5e9;
    }

    header {
      background: green;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 20px;
    }

    .container {
      padding: 10px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    button {
      padding: 10px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
    }

    video {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  🕌 Welcome to Mohammad Rashid App
</header>

<div class="container">

  <!-- Prayer -->
  <div class="card" id="prayer"></div>

  <!-- Tasbeeh -->
  <div class="card">
    <h2>📿 Tasbeeh Counter</h2>
    <h1 id="count">0</h1>
    <button onclick="inc()">+ Count</button>
  </div>

  <!-- Qibla -->
  <div class="card">
    <h2>🧭 Qibla Direction</h2>
    <p>Facing West (Approx)</p>
  </div>

  <!-- Quran Tracker -->
  <div class="card">
    <h2>📖 Quran Tracker</h2>
    <input type="number" id="goal" placeholder="Enter pages read">
    <button onclick="saveProgress()">Save</button>
    <p id="progress"></p>
  </div>

  <!-- Shorts -->
  <div class="card">
    <h2>🎥 Islamic Shorts</h2>
    <video controls id="video"></video>
  </div>

</div>

<script>

// Tasbeeh
let count = 0;
function inc() {
  count++;
  document.getElementById("count").innerText = count;
}

// Quran tracker
function saveProgress() {
  let val = document.getElementById("goal").value;
  localStorage.setItem("quran", val);
  document.getElementById("progress").innerText = "Saved: " + val + " pages";
}

// Load saved progress
window.onload = () => {
  let saved = localStorage.getItem("quran");
  if(saved){
    document.getElementById("progress").innerText = "Saved: " + saved + " pages";
  }
};

// Fetch JSON
fetch("data.json")
.then(res => res.json())
.then(data => {

  let p = data.prayer;

  document.getElementById("prayer").innerHTML = `
    <h2>🕋 Prayer Times</h2>
    Fajr: ${p.Fajr} <br>
    Dhuhr: ${p.Dhuhr} <br>
    Asr: ${p.Asr} <br>
    Maghrib: ${p.Maghrib} <br>
    Isha: ${p.Isha}
  `;

  document.getElementById("video").src = data.videos[0].url;
});

</script>

</body>
</html>
